<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Warriors: Zero</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a2a3a; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #hud {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            color: #00ff00; text-shadow: 0 0 5px #000; font-size: 14px;
        }
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 2px solid rgba(0, 255, 0, 0.5); border-radius: 50%;
        }
        #score-pos { position: absolute; top: 20px; left: 20px; font-size: 24px; color: #fff; }
        #speed-bar { position: absolute; left: 20px; bottom: 50px; width: 10px; height: 100px; border: 1px solid #fff; }
        #speed-fill { position: absolute; bottom: 0; width: 100%; background: #00ff00; transition: height 0.1s; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score-pos">KILLS: <span id="score">0</span></div>
        <div class="crosshair"></div>
        <div id="speed-bar"><div id="speed-fill"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, score = 0;
        const particles = [];
        const enemies = [];
        const bullets = [];
        const joystick = { active: false, x: 0, y: 0, curX: 0, curY: 0 };

        const player = {
            x: 0, y: 0, angle: -Math.PI/2, speed: 4, 
            targetAngle: -Math.PI/2, roll: 0, health: 100
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2; player.y = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // タッチ制御
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            joystick.active = true;
            joystick.x = t.clientX; joystick.y = t.clientY;
            joystick.curX = t.clientX; joystick.curY = t.clientY;
        });
        canvas.addEventListener('touchmove', e => {
            const t = e.touches[0];
            joystick.curX = t.clientX; joystick.curY = t.clientY;
        });
        canvas.addEventListener('touchend', () => joystick.active = false);

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 30, color: color || '#ff4400'
                });
            }
        }

        function update() {
            // プレイヤーの動き（WTM風の追従）
            if (joystick.active) {
                const dx = joystick.curX - joystick.x;
                const dy = joystick.curY - joystick.y;
                if (Math.hypot(dx, dy) > 10) {
                    player.targetAngle = Math.atan2(dy, dx);
                    // 旋回時のロール演出
                    let diff = player.targetAngle - player.angle;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    player.angle += diff * 0.05;
                    player.roll = diff * 5; // 旋回方向に傾く
                }
                // 自動射撃
                if (Math.random() < 0.3) {
                    bullets.push({x: player.x, y: player.y, angle: player.angle + (Math.random()-0.5)*0.05, life: 50});
                }
            } else {
                player.roll *= 0.9;
            }

            // スピードバー更新
            document.getElementById('speed-fill').style.height = (player.speed * 15) + 'px';

            // 弾の移動
            for(let i = bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.x += Math.cos(b.angle) * 15;
                b.y += Math.sin(b.angle) * 15;
                if(--b.life < 0) bullets.splice(i, 1);
            }

            // 敵の処理
            if (enemies.length < 3 && Math.random() < 0.02) {
                enemies.push({
                    x: Math.random()*width, y: Math.random()*height, 
                    angle: Math.random()*Math.PI*2, speed: 3, health: 3
                });
            }

            enemies.forEach((en, ei) => {
                en.x += Math.cos(en.angle) * en.speed;
                en.y += Math.sin(en.angle) * en.speed;
                en.x = (en.x + width) % width;
                en.y = (en.y + height) % height;

                // 弾との判定
                bullets.forEach((b, bi) => {
                    if (Math.hypot(en.x - b.x, en.y - b.y) < 30) {
                        en.health--;
                        bullets.splice(bi, 1);
                        createExplosion(b.x, b.y, '#ffff00');
                        if(en.health <= 0) {
                            createExplosion(en.x, en.y, '#ff0000');
                            enemies.splice(ei, 1);
                            score++;
                            document.getElementById('score').innerText = score;
                        }
                    }
                });
            });

            // パーティクル
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(--p.life < 0) particles.splice(i, 1);
            });
        }

        function drawPlane(x, y, angle, roll, color, isPlayer) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            // 影
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(-15, 15, 30, 5);

            // 主翼 (ロールに応じて伸縮させて3D感を出す)
            ctx.fillStyle = color;
            const wingWidth = 50 * Math.cos(roll * 0.1);
            ctx.fillRect(-8, -wingWidth/2, 12, wingWidth);
            
            // 胴体
            ctx.beginPath();
            ctx.ellipse(0, 0, 25, 8, 0, 0, Math.PI*2);
            ctx.fill();

            if(isPlayer) {
                // 日の丸
                ctx.fillStyle = 'red';
                ctx.beginPath(); ctx.arc(-5, -wingWidth*0.35, 6, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(-5, wingWidth*0.35, 6, 0, 7); ctx.fill();
            }
            
            ctx.restore();
        }

        function draw() {
            // 背景
            const g = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, width);
            g.addColorStop(0, '#4a89aa'); g.addColorStop(1, '#1a3a4a');
            ctx.fillStyle = g;
            ctx.fillRect(0,0,width,height);

            // グリッド（速度感用）
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let i=0; i<width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }

            update();

            bullets.forEach(b => {
                ctx.strokeStyle = '#fff200'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(b.x, b.y);
                ctx.lineTo(b.x - Math.cos(b.angle)*20, b.y - Math.sin(b.angle)*20);
                ctx.stroke();
            });

            enemies.forEach(en => drawPlane(en.x, en.y, en.angle, 0, '#555', false));
            drawPlane(player.x, player.y, player.angle, player.roll, '#2d5d3e', true);

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life/30;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
