<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>航空戦ゲーム - モバイル対応</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: "MS Gothic", "Hiragino Sans", sans-serif;
            text-align: center;
            overflow: hidden;
            touch-action: none; /* ピンチズーム防止 */
        }
        #menu {
            position: absolute;
            inset: 0;
            background: rgba(0, 50, 100, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 {
            font-size: clamp(32px, 8vw, 48px);
            margin: 20px 0;
            text-shadow: 0 0 10px #0ff;
        }
        label {
            font-size: clamp(18px, 5vw, 24px);
            margin: 12px 0 4px;
        }
        select, button {
            font-size: clamp(16px, 4.5vw, 22px);
            padding: 10px 20px;
            margin: 8px;
            width: 80%;
            max-width: 360px;
            background: #112;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            background: #0a0;
            color: white;
            border-color: #0f0;
        }
        button:hover, button:active {
            background: #0f0;
            color: #000;
        }
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #87CEEB;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            font-size: clamp(14px, 3.5vw, 18px);
            border-radius: 5px;
            pointer-events: none;
        }
        #virtual-joystick {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            touch-action: none;
            z-index: 5;
            display: none;
        }
        #joystick-knob {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(0,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #fire-btn, #bomb-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: rgba(0,200,0,0.6);
            border: 3px solid #0f0;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            z-index: 5;
            user-select: none;
        }
        #bomb-btn {
            right: 130px;
            background: rgba(200,0,0,0.6);
            border-color: #f00;
            display: none;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>✈️ 航空戦ゲーム ✈️</h1>
        <label>モードを選択</label>
        <select id="mode">
            <option value="fighter">戦闘機モード（味方爆撃機を護衛）</option>
            <option value="bomber">爆撃機モード（目的地を爆撃）</option>
        </select>

        <label>機体を選択（装甲が違う！）</label>
        <select id="planeSelect"></select>

        <label>難易度</label>
        <select id="difficulty">
            <option value="easy">簡単（敵少ない・弱い）</option>
            <option value="medium" selected>普通</option>
            <option value="hard">難しい（敵大量・強い）</option>
        </select>

        <label>マップ</label>
        <select id="map">
            <option value="pacific">太平洋（青空）</option>
            <option value="europe">ヨーロッパ（薄曇り）</option>
        </select>

        <button onclick="startGame()">ゲーム開始！</button>
    </div>

    <canvas id="game"></canvas>

    <div id="instructions" style="display:none;">
        左下のジョイスティックで移動<br>
        右下のボタンで射撃 / 爆弾
    </div>

    <div id="virtual-joystick">
        <div id="joystick-knob"></div>
    </div>
    <div id="fire-btn">射撃</div>
    <div id="bomb-btn">爆弾</div>

    <script>
        // ====================== グローバル変数 ======================
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let mode, selectedPlane, difficulty, mapType;
        let player = {}, ally = {}, target = null;
        let bullets = [], enemyBullets = [], enemies = [];
        let keys = {}; // PC用に残す
        let lastShot = 0, lastBomb = 0;
        let gameTime = 0, score = 0, spawnTimer = 0;
        let gameRunning = false;

        // モバイル用コントロール
        let joystick = { active: false, x: 0, y: 0, dx: 0, dy: 0 };
        let firePressed = false;
        let bombPressed = false;

        // ====================== 機体データ（変更なし） ======================
        const fighters = [
            {name: "零戦", armor: 75, speed: 6.5, fireRate: 12},
            {name: "IL-2 (1942)", armor: 130, speed: 5.0, fireRate: 8},
            {name: "Yak-3", armor: 65, speed: 7.5, fireRate: 14},
            {name: "Spitfire Mk.V", armor: 85, speed: 6.8, fireRate: 11},
            {name: "P-51 Mustang", armor: 90, speed: 6.2, fireRate: 10},
            {name: "Bf 109 G", armor: 80, speed: 7.0, fireRate: 13},
            {name: "Fw 190 A", armor: 95, speed: 5.8, fireRate: 9},
            {name: "Ki-84 疾風", armor: 88, speed: 6.5, fireRate: 12},
            {name: "P-38 Lightning", armor: 105, speed: 5.5, fireRate: 8},
            {name: "Tempest Mk.V", armor: 82, speed: 7.2, fireRate: 13}
        ];

        const bombers = [
            {name: "Catalina", armor: 160, speed: 4.0, fireRate: 6},
            {name: "B-34 Ventura", armor: 145, speed: 4.5, fireRate: 7},
            {name: "B-17 Flying Fortress", armor: 220, speed: 3.5, fireRate: 5},
            {name: "Lancaster", armor: 190, speed: 4.0, fireRate: 6},
            {name: "He 111", armor: 135, speed: 4.3, fireRate: 7}
        ];

        // ====================== 機体選択更新 ======================
        function updatePlaneOptions() {
            const modeVal = document.getElementById('mode').value;
            const select = document.getElementById('planeSelect');
            select.innerHTML = '';
            const list = (modeVal === 'fighter') ? fighters : bombers;
            list.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = `${p.name}（装甲 ${p.armor}）`;
                select.appendChild(opt);
            });
        }

        // ====================== キャンバスサイズ調整 ======================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ====================== ゲーム開始 ======================
        function startGame() {
            mode = document.getElementById('mode').value;
            const planeName = document.getElementById('planeSelect').value;
            difficulty = document.getElementById('difficulty').value;
            mapType = document.getElementById('map').value;

            const list = (mode === 'fighter') ? fighters : bombers;
            selectedPlane = list.find(p => p.name === planeName);

            player = {
                x: canvas.width / 2 - 20,
                y: canvas.height - 80,
                width: 40,
                height: 35,
                speed: selectedPlane.speed * 1.2, // モバイルは少し速めに
                health: selectedPlane.armor,
                maxHealth: selectedPlane.armor,
                fireRate: selectedPlane.fireRate
            };

            if (mode === 'fighter') {
                ally = {
                    x: canvas.width * 0.2,
                    y: canvas.height * 0.4,
                    width: 55,
                    height: 38,
                    health: 180,
                    maxHealth: 180,
                    speed: 1.8
                };
            } else {
                ally = {
                    x: canvas.width * 0.6,
                    y: canvas.height - 180,
                    width: 38,
                    height: 32,
                    health: 110,
                    maxHealth: 110,
                    speed: 5.5
                };
                document.getElementById('bomb-btn').style.display = 'flex';
            }

            if (mode === 'bomber') {
                target = {
                    x: canvas.width * 0.7,
                    y: canvas.height - 120,
                    width: 110,
                    height: 55,
                    health: 250,
                    maxHealth: 250
                };
            }

            bullets = [];
            enemyBullets = [];
            enemies = [];
            gameTime = 0;
            score = 0;
            spawnTimer = 0;
            lastShot = Date.now();
            lastBomb = Date.now();

            for (let i = 0; i < (difficulty === 'easy' ? 3 : 5); i++) spawnEnemy();

            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('virtual-joystick').style.display = 'block';
            document.getElementById('fire-btn').style.display = 'flex';

            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // ====================== 敵生成・その他ロジック（変更なし） ======================
        function spawnEnemy() {
            const ex = Math.random() * (canvas.width - 45);
            enemies.push({
                x: ex,
                y: -40,
                width: 42,
                height: 32,
                health: (difficulty === 'easy') ? 45 : (difficulty === 'medium') ? 70 : 105
            });
        }

        function collide(a, b) {
            return !(a.x + a.width < b.x || b.x + b.width < a.x ||
                     a.y + a.height < b.y || b.y + b.height < a.y);
        }

        function drawPlane(x, y, w, h, color, isPlayer) {
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            ctx.fillStyle = color;
            ctx.fillRect(-5, -h/2, 10, h);
            ctx.fillRect(-w/2 + 2, -5, w - 4, 12);
            ctx.fillRect(-12, h/2 - 10, 24, 8);
            if (isPlayer) {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(-3, -h/2 - 8, 6, 12);
            }
            ctx.restore();
        }

        // ====================== モバイルコントロール ======================
        const joystickEl = document.getElementById('virtual-joystick');
        const knob = document.getElementById('joystick-knob');
        const fireBtn = document.getElementById('fire-btn');
        const bombBtn = document.getElementById('bomb-btn');

        joystickEl.addEventListener('touchstart', e => {
            e.preventDefault();
            joystick.active = true;
            updateJoystick(e.touches[0]);
        });

        joystickEl.addEventListener('touchmove', e => {
            e.preventDefault();
            if (joystick.active) updateJoystick(e.touches[0]);
        });

        joystickEl.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.dx = 0;
            joystick.dy = 0;
            knob.style.left = '50%';
            knob.style.top = '50%';
        });

        function updateJoystick(touch) {
            const rect = joystickEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.hypot(dx, dy);
            const maxDist = 50;

            if (dist > maxDist) {
                dx = dx * maxDist / dist;
                dy = dy * maxDist / dist;
            }

            joystick.dx = dx / maxDist;
            joystick.dy = dy / maxDist;

            knob.style.left = `${50 + (dx / maxDist * 40)}%`;
            knob.style.top = `${50 + (dy / maxDist * 40)}%`;
        }

        // 射撃ボタン
        function handleFireStart() { firePressed = true; }
        function handleFireEnd() { firePressed = false; }
        fireBtn.addEventListener('touchstart', e => { e.preventDefault(); handleFireStart(); });
        fireBtn.addEventListener('touchend', handleFireEnd);
        fireBtn.addEventListener('touchcancel', handleFireEnd);

        // 爆弾ボタン
        function handleBombStart() { bombPressed = true; }
        function handleBombEnd() { bombPressed = false; }
        bombBtn.addEventListener('touchstart', e => { e.preventDefault(); handleBombStart(); });
        bombBtn.addEventListener('touchend', handleBombEnd);
        bombBtn.addEventListener('touchcancel', handleBombEnd);

        // PC用キーも残す
        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') e.preventDefault(); });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        // ====================== メインループ ======================
        function gameLoop() {
            if (!gameRunning) return;

            const now = Date.now();

            // モバイル移動
            if (joystick.active) {
                player.x += joystick.dx * player.speed * 2;
                player.y += joystick.dy * player.speed * 2;
            }

            // PC移動（従来通り）
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;

            // 画面内に制限
            player.x = Math.max(10, Math.min(canvas.width - player.width - 10, player.x));
            player.y = Math.max(10, Math.min(canvas.height - player.height - 10, player.y));

            // 射撃（モバイル + PC）
            const shotInterval = 1000 / player.fireRate;
            if ((firePressed || keys[' '] || keys['z']) && now - lastShot > shotInterval) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    dy: -11,
                    isBomb: false
                });
                lastShot = now;
            }

            // 爆弾（モバイル + PC）
            if (mode === 'bomber' && (bombPressed || keys['b']) && now - lastBomb > 900) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y + 10,
                    dy: 7,
                    isBomb: true
                });
                lastBomb = now;
            }

            // 以下は元のロジックと同じ（update関数の中身をここに展開）
            gameTime++;

            // 弾移動
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y += b.dy;
                if ((!b.isBomb && b.y < -20) || (b.isBomb && b.y > canvas.height + 20)) {
                    bullets.splice(i, 1);
                }
            }

            // 敵生成
            spawnTimer++;
            const spawnInterval = (difficulty === 'easy') ? 85 : (difficulty === 'medium') ? 48 : 28;
            if (spawnTimer > spawnInterval) {
                spawnEnemy();
                if (difficulty === 'hard') spawnEnemy();
                spawnTimer = 0;
            }

            // 敵移動・射撃（省略せず元のロジックを維持）
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += 2.8;
                const tx = (mode === 'fighter') ? ally.x + 20 : player.x + 20;
                const ty = (mode === 'fighter') ? ally.y + 15 : player.y + 15;
                const dx = tx - e.x;
                const dy = ty - e.y;
                const dist = Math.hypot(dx, dy) || 1;
                e.x += (dx / dist) * 1.4;

                if (e.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                    continue;
                }

                if (Math.random() < 0.018) {
                    enemyBullets.push({
                        x: e.x + 18,
                        y: e.y + 25,
                        dy: 6.5
                    });
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.y += eb.dy;
                if (eb.y > canvas.height + 20) enemyBullets.splice(i, 1);
            }

            // 衝突判定（省略せず維持）
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (collide(b, enemies[j])) {
                        enemies[j].health -= b.isBomb ? 45 : 28;
                        bullets.splice(i, 1);
                        if (enemies[j].health <= 0) {
                            enemies.splice(j, 1);
                            score += 120;
                        }
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (collide(player, {x: enemyBullets[i].x - 3, y: enemyBullets[i].y - 3, width: 6, height: 6})) {
                    player.health -= 12;
                    enemyBullets.splice(i, 1);
                    if (player.health <= 0) endGame(false);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (collide(player, enemies[i])) {
                    player.health -= 35;
                    enemies.splice(i, 1);
                    if (player.health <= 0) endGame(false);
                }
            }

            if (mode === 'fighter') {
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    if (collide(ally, {x: enemyBullets[i].x - 3, y: enemyBullets[i].y - 3, width: 6, height: 6})) {
                        ally.health -= 18;
                        enemyBullets.splice(i, 1);
                    }
                }
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (collide(ally, enemies[i])) {
                        ally.health -= 40;
                        enemies.splice(i, 1);
                    }
                }
            }

            if (mode === 'bomber' && target) {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    if (b.isBomb && collide(b, target)) {
                        target.health -= 48;
                        bullets.splice(i, 1);
                        if (target.health <= 0) {
                            score += 800;
                            endGame(true);
                        }
                    }
                }
            }

            // 味方移動
            if (mode === 'fighter') {
                ally.x += ally.speed;
                if (ally.x > canvas.width + 20) ally.x = canvas.width + 20;
            } else {
                ally.x += (player.x + 45 - ally.x) * 0.12;
                ally.y = player.y - 95;
            }

            // クリア判定
            if (mode === 'fighter' && gameTime > 3600) {
                if (ally.health > 0) endGame(true);
            }
            if (ally.health <= 0 || player.health <= 0) endGame(false);

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = (mapType === 'pacific') ? '#87CEEB' : '#A0C0E0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillRect(canvas.width*0.1, canvas.height*0.15, 180, 35);
            ctx.fillRect(canvas.width*0.6, canvas.height*0.25, 160, 28);

            drawPlane(player.x, player.y, player.width, player.height, '#00ff00', true);
            const allyColor = (mode === 'fighter') ? '#00aaff' : '#ffaa00';
            drawPlane(ally.x, ally.y, ally.width, ally.height, allyColor, false);

            if (target) {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(target.x, target.y, target.width, target.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px sans-serif';
                ctx.fillText('目的地', target.x + 18, target.y + 35);
                const tPercent = target.health / target.maxHealth;
                ctx.fillStyle = tPercent > 0.3 ? '#0f0' : '#f00';
                ctx.fillRect(target.x, target.y - 12, target.width * tPercent, 8);
            }

            ctx.fillStyle = '#ffffff';
            for (let b of bullets) {
                if (!b.isBomb) ctx.fillRect(b.x, b.y, 7, 14);
            }
            ctx.fillStyle = '#222';
            for (let b of bullets) {
                if (b.isBomb) {
                    ctx.beginPath();
                    ctx.arc(b.x + 3, b.y + 5, 7, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.fillStyle = '#ff2222';
            for (let eb of enemyBullets) {
                ctx.fillRect(eb.x, eb.y, 6, 13);
            }

            for (let e of enemies) {
                drawPlane(e.x, e.y, e.width, e.height, '#ff2222', false);
            }

            const pPercent = Math.max(0, player.health / player.maxHealth);
            ctx.fillStyle = pPercent > 0.4 ? '#00ff00' : '#ff0000';
            ctx.fillRect(player.x, player.y - 15, player.width * pPercent, 6);

            const aPercent = Math.max(0, ally.health / ally.maxHealth);
            ctx.fillStyle = aPercent > 0.4 ? '#00aaff' : '#ff0000';
            ctx.fillRect(ally.x, ally.y - 15, ally.width * aPercent, 6);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px sans-serif';
            ctx.fillText(`時間: ${Math.floor(gameTime / 60)}秒`, 20, 40);
            ctx.fillText(`スコア: ${score}`, 20, 80);

            ctx.font = '18px sans-serif';
            if (mode === 'fighter') {
                ctx.fillText('味方爆撃機を護衛せよ！', canvas.width - 240, 40);
            } else {
                ctx.fillText('爆弾で目標を破壊！', canvas.width - 220, 40);
            }
        }

        function endGame(win) {
            gameRunning = false;
            setTimeout(() => {
                alert(win ?
                    `🎉 ミッションクリア！\nスコア ${score}点` :
                    `💥 撃墜されました...\nスコア ${score}点`);
                location.reload(); // メニューに戻る（シンプルにリロード）
            }, 300);
        }

        // 初期化
        window.onload = () => {
            document.getElementById('mode').addEventListener('change', updatePlaneOptions);
            updatePlaneOptions();
        };
    </script>
</body>
</html>
