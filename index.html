<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FNAFミニ - 超簡単＆コンパクト版</title>
<style>
    body {
        margin:0; padding:0; height:100vh; background:#000; overflow:hidden;
        font-family:Arial, sans-serif; color:#0f0; touch-action:manipulation;
        user-select:none;
    }
    #container {
        max-width: 600px;
        margin: 0 auto;
        height: 100%;
        position: relative;
        background: #0a0a0a;
    }
    .door {
        position:absolute; top:0; height:100%; width:40%; background:#222;
        transition:transform 0.5s; box-shadow:inset 0 0 40px #000;
        border:2px solid #444;
    }
    #left-door  { left:0;  transform:translateX(-100%); }
    #right-door { right:0; transform:translateX(100%); }
    .closed { transform:translateX(0)!important; background:#111; box-shadow:0 0 60px #800; }

    .btn {
        position:absolute; bottom:5%; width:22%; height:16%;
        background:rgba(0,0,0,0.7); border:3px solid #0f0; color:#0f0;
        font-size:1.2rem; font-weight:bold; display:flex; align-items:center;
        justify-content:center; cursor:pointer; transition:0.2s; z-index:10;
    }
    .btn:active { background:#0f0; color:#000; }
    #left-door-btn  { left:8%; }
    #right-door-btn { right:8%; }
    #cam-btn {
        bottom:22%; left:50%; transform:translateX(-50%);
        width:30%; height:12%; font-size:1.1rem;
    }

    #hud {
        position:absolute; top:0; left:0; right:0; padding:8px;
        display:flex; justify-content:space-between; font-size:1.1rem;
        background:rgba(0,0,0,0.6); z-index:20; pointer-events:none;
    }
    #time { position:absolute; bottom:40%; left:50%; transform:translateX(-50%);
            font-size:2.4rem; color:#f66; text-shadow:0 0 15px #800; z-index:5; }

    #jumpscare {
        position:absolute; inset:0; background:#000; opacity:0;
        transition:opacity 0.2s; z-index:999; pointer-events:none;
        display:flex; align-items:center; justify-content:center;
        font-size:60px; color:#f00;
    }
    #start {
        position:absolute; inset:0; background:rgba(0,0,0,0.9); z-index:1000;
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
        color:#0f0; font-size:2.2rem;
    }
</style>
</head>
<body>

<div id="container">
    <div id="left-door"  class="door"></div>
    <div id="right-door" class="door"></div>

    <div id="hud">
        <div>NIGHT 1 EASY</div>
        <div id="power">電力: 99%</div>
    </div>

    <div id="time">12 AM</div>

    <!-- コントロール（シンプルにドア＋カメラだけ） -->
    <div id="left-door-btn"  class="btn">左ドア</div>
    <div id="right-door-btn" class="btn">右ドア</div>
    <div id="cam-btn"        class="btn">カメラ</div>

    <div id="jumpscare">やられた！</div>
</div>

<div id="start">
    <div>超簡単FNAFミニ</div>
    <button onclick="startGame()" style="padding:14px 40px; font-size:1.6rem; background:#000; color:#0f0; border:3px solid #0f0;">はじめる</button>
</div>

<script>
let power = 99;
let timeHour = 0;
let gameRunning = false;
let leftDoorClosed  = false;
let rightDoorClosed = false;
let cameraOn        = false;

let enemyPos = 0;  // 0〜5（5で攻撃）

const powerEl    = document.getElementById('power');
const timeEl     = document.getElementById('time');
const jumpscare  = document.getElementById('jumpscare');
const startScr   = document.getElementById('start');
const leftDoorEl = document.getElementById('left-door');
const rightDoorEl= document.getElementById('right-door');
const camBtn     = document.getElementById('cam-btn');

function updateDoors() {
    leftDoorEl.classList.toggle('closed', leftDoorClosed);
    rightDoorEl.classList.toggle('closed', rightDoorClosed);
}

    let drain = 0
