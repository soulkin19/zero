<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五夜の警備員 - モバイル対応版</title>
<style>
    body {
        margin:0;
        height:100vh;
        background:#000;
        font-family: Arial, sans-serif;
        color:#0f3;
        overflow:hidden;
        touch-action: none;          /* スマホのピンチズーム等を防ぐ */
        user-select: none;
    }
    #game {
        position: relative;
        width: 100%;
        height: 100%;
        background: #111 radial-gradient(circle at 50% 30%, #222 0%, #000 70%);
    }
    #office {
        position: absolute;
        inset:0;
        background: linear-gradient(#1a1a1a, #000);
        filter: brightness(0.5);
    }
    .door {
        position: absolute;
        top: 0;
        width: 38%;
        height: 100%;
        background: #1e1e1e;
        transition: all 0.6s ease;
        box-shadow: inset 0 0 80px #000;
        border: 2px solid #333;
    }
    #left-door  { left:0; transform: translateX(-100%); }
    #right-door { right:0; transform: translateX(100%); }
    .closed {
        transform: translateX(0) !important;
        background: #0a0a0a;
        box-shadow: inset 0 0 140px #000, 0 0 60px #c00;
        border-color: #c00;
    }
    #hud {
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        font-size: 1.3rem;
        background: rgba(0,0,0,0.5);
        z-index: 10;
        pointer-events: none;
    }
    #time {
        position: absolute;
        bottom: 8%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 3.2rem;
        font-weight: bold;
        color: #f33;
        text-shadow: 0 0 30px #800, 0 0 60px #400;
        z-index: 5;
        pointer-events: none;
    }
    #jump {
        position: absolute;
        inset:0;
        background:#000 url('https://via.placeholder.com/800x600/000/800?text=JUMPSCARE!') center/contain no-repeat;
        opacity: 0;
        transition: opacity 0.2s;
        z-index: 999;
        pointer-events: none;
    }
    #start {
        position: absolute;
        inset:0;
        background: rgba(0,0,0,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        z-index: 1000;
        color: #0f3;
        font-size: 2.8rem;
    }
    button {
        padding: 18px 50px;
        font-size: 2rem;
        background: #000;
        color: #0f3;
        border: 4px solid #0f3;
        cursor: pointer;
        transition: 0.25s;
    }
    button:active, button:hover {
        background: #0f3;
        color: #000;
        box-shadow: 0 0 40px #0f3;
    }
    /* タッチエリアの視覚的ヒント（オプション） */
    .touch-hint {
        position: absolute;
        top: 40%;
        font-size: 1.1rem;
        color: rgba(0,255,51,0.4);
        pointer-events: none;
        z-index: 8;
    }
    #left-hint  { left: 10%; }
    #right-hint { right: 10%; }
</style>
</head>
<body>

<div id="game">
    <div id="office"></div>
    <div id="left-door"  class="door"></div>
    <div id="right-door" class="door"></div>
    
    <div id="hud">
        <div>NIGHT 1</div>
        <div id="power">電力: 100%</div>
    </div>
    
    <div id="time">12 AM</div>
    
    <div id="jump"></div>
    
    <div class="touch-hint" id="left-hint">← 左ドア タップ</div>
    <div class="touch-hint" id="right-hint">右ドア タップ →</div>
</div>

<div id="start">
    <div>五夜の警備員<br><small style="font-size:1.1rem;opacity:0.7;">モバイル対応版</small></div>
    <button onclick="start()">START</button>
</div>

<script>
let power = 100;
let hour = 0;
let isLeftClosed  = false;
let isRightClosed = false;
let gameActive = false;
let enemyAt   = 0;     // 0=遠く ... 3=ドア前
let enemySide = 'left';

const leftDoor  = document.getElementById('left-door');
const rightDoor = document.getElementById('right-door');
const powerEl   = document.getElementById('power');
const timeEl    = document.getElementById('time');
const jump      = document.getElementById('jump');
const startScr  = document.getElementById('start');

function updateDoors() {
    leftDoor.classList.toggle('closed', isLeftClosed);
    rightDoor.classList.toggle('closed', isRightClosed);
}

function drain(amount) {
    power -= amount;
    if (power < 0) power = 0;
    powerEl.textContent = `電力: ${Math.floor(power)}%`;
    if (power <= 0) endGame(false);
}

function endGame(won = false) {
    gameActive = false;
    if (!won) {
        jump.style.opacity = 1;
        setTimeout(() => {
            alert("…やられた GAME OVER");
            location.reload();
        }, 1800);
    } else {
        alert("6 AM！ 生き延びた！");
        location.reload();
    }
}

function aiMove() {
    if (!gameActive) return;

    if (Math.random() < 0.16 + hour * 0.035) {
        if (enemyAt < 3) {
            enemyAt++;
        } else {
            const closed = enemySide === 'left' ? isLeftClosed : isRightClosed;
            if (!closed) {
                endGame(false);
                return;
            } else {
                enemyAt = Math.random() < 0.6 ? 0 : 1;
            }
        }
        if (Math.random() < 0.28) {
            enemySide = enemySide === 'left' ? 'right' : 'left';
        }
    }
}

function tick() {
    if (!gameActive) return;

    let drain = 0.9;
    if (isLeftClosed)  drain += 3.2;
    if (isRightClosed) drain += 3.2;
    drain(drain);

    hour += 1 / 240;   // 約4分で6時間（調整可）
    const h = Math.floor(hour) + 12;
    timeEl.textContent = `${h % 12 || 12} ${h < 18 ? 'AM' : 'PM'}`;

    if (hour >= 6) {
        endGame(true);
        return;
    }

    aiMove();
}

// タッチ & クリック共通処理
function handleInput(e) {
    if (!gameActive) return;
    e.preventDefault();

    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const half = window.innerWidth / 2;

    if (x < half) {
        isLeftClosed = !isLeftClosed;
    } else {
        isRightClosed = !isRightClosed;
    }
    updateDoors();
}

document.addEventListener('click', handleInput);
document.addEventListener('touchstart', handleInput, {passive: false});

function start() {
    startScr.style.display = 'none';
    gameActive = true;
    power = 100;
    hour = 0;
    enemyAt = 0;
    isLeftClosed = isRightClosed = false;
    updateDoors();
    powerEl.textContent = "電力: 100%";
    timeEl.textContent = "12 AM";
    jump.style.opacity = 0;

    setInterval(tick, 1000 / 4);  // スムーズに
}
</script>
</body>
</html>
