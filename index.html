<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Hunter Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 10px; left: 10px; color: white; 
            text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10;
        }
        .instr { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div class="instr">L-Side: Turn Left / R-Side: Turn Right / Both: Boost & Fire</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 画面サイズ設定
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        const touches = {}; // タッチ状態を管理

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            angle: -Math.PI / 2,
            speed: 2,
            maxSpeed: 6,
            bullets: []
        };

        let enemies = [];

        // タッチイベント処理
        window.addEventListener('touchstart', e => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                touches[t.identifier] = t.clientX;
            }
        }, {passive: false});

        window.addEventListener('touchend', e => {
            for (let t of e.changedTouches) {
                delete touches[t.identifier];
            }
        });

        function update() {
            let leftTouch = false;
            let rightTouch = false;

            // タッチ位置による旋回判定
            Object.values(touches).forEach(posX => {
                if (posX < canvas.width / 2) leftTouch = true;
                else rightTouch = true;
            });

            if (leftTouch && !rightTouch) player.angle -= 0.08;
            if (rightTouch && !leftTouch) player.angle += 0.08;
            
            // 両方押しでブースト＆自動射撃
            if (leftTouch && rightTouch) {
                player.speed = Math.min(player.speed + 0.2, player.maxSpeed);
                if (Math.random() < 0.15) fire();
            } else {
                player.speed = Math.max(player.speed * 0.98, 2);
            }

            // 移動計算
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;

            // 画面端ループ
            player.x = (player.x + canvas.width) % canvas.width;
            player.y = (player.y + canvas.height) % canvas.height;

            // 弾の更新
            player.bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * 10;
                b.y += Math.sin(b.angle) * 10;
                b.life--;
                if (b.life < 0) player.bullets.splice(i, 1);
            });

            // 敵の更新と当たり判定
            enemies.forEach((en, ei) => {
                en.x += Math.cos(en.angle) * 2.5;
                en.y += Math.sin(en.angle) * 2.5;
                en.x = (en.x + canvas.width) % canvas.width;
                en.y = (en.y + canvas.height) % canvas.height;

                player.bullets.forEach((b, bi) => {
                    if (Math.hypot(en.x - b.x, en.y - b.y) < 25) {
                        enemies.splice(ei, 1);
                        player.bullets.splice(bi, 1);
                        score += 100;
                        scoreElement.innerText = score;
                    }
                });
            });

            if (Math.random() < 0.03 && enemies.length < 5) spawnEnemy();
        }

        function fire() {
            if (player.bullets.length < 10) {
                player.bullets.push({ x: player.x, y: player.y, angle: player.angle, life: 40 });
            }
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                angle: Math.random() * Math.PI * 2
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 弾
            ctx.fillStyle = '#FFF200';
            player.bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill();
            });

            // 自機
            drawPlane(player.x, player.y, player.angle, 'white');
            
            // 敵
            enemies.forEach(en => drawPlane(en.x, en.y, en.angle, '#FF4444'));

            update();
            requestAnimationFrame(draw);
        }

        function drawPlane(x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(20, 0);   // 鼻先
            ctx.lineTo(-15, -12); // 左翼
            ctx.lineTo(-10, 0);   // 後部
            ctx.lineTo(-15, 12);  // 右翼
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        draw();
    </script>
</body>
</html>
