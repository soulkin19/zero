<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>航空戦ゲーム - 調整版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: "MS Gothic", "Hiragino Sans", sans-serif;
            text-align: center;
            overflow: hidden;
            touch-action: none;
        }
        #menu {
            position: absolute;
            inset: 0;
            background: rgba(0, 50, 100, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: clamp(32px, 8vw, 48px); margin: 20px 0; text-shadow: 0 0 10px #0ff; }
        label { font-size: clamp(18px, 5vw, 24px); margin: 12px 0 4px; }
        select, button {
            font-size: clamp(16px, 4.5vw, 22px);
            padding: 10px 20px;
            margin: 8px;
            width: 80%;
            max-width: 360px;
            background: #112;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button { cursor: pointer; background: #0a0; color: white; border-color: #0f0; }
        button:hover, button:active { background: #0f0; color: #000; }

        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #87CEEB;
        }

        #instructions {
            position: absolute;
            bottom: 140px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            font-size: clamp(14px, 3.5vw, 18px);
            border-radius: 5px;
            pointer-events: none;
        }

        #virtual-joystick {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 50%;
            touch-action: none;
            z-index: 5;
            display: none;
        }
        #joystick-knob {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(0,255,255,0.7);
            border: 2px solid #0ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px #0ff;
        }

        #fire-btn, #bomb-btn {
            position: absolute;
            bottom: 30px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            z-index: 5;
            user-select: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #fire-btn {
            right: 30px;
            background: rgba(0,180,0,0.75);
            border: 4px solid #0f0;
        }
        #bomb-btn {
            right: 150px;
            background: rgba(180,0,0,0.75);
            border: 4px solid #f00;
            display: none;
        }
        #fire-btn:active, #bomb-btn:active {
            transform: scale(1.15);
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>✈️ 航空戦ゲーム ✈️</h1>
        <label>モードを選択</label>
        <select id="mode">
            <option value="fighter">戦闘機モード（味方爆撃機を護衛）</option>
            <option value="bomber">爆撃機モード（目的地を爆撃）</option>
        </select>

        <label>機体を選択（装甲が違う！）</label>
        <select id="planeSelect"></select>

        <label>難易度</label>
        <select id="difficulty">
            <option value="easy">簡単</option>
            <option value="medium" selected>普通</option>
            <option value="hard">難しい</option>
        </select>

        <label>マップ</label>
        <select id="map">
            <option value="pacific">太平洋（青空）</option>
            <option value="europe">ヨーロッパ（薄曇り）</option>
        </select>

        <button onclick="startGame()">ゲーム開始！</button>
    </div>

    <canvas id="game"></canvas>

    <div id="instructions" style="display:none;">
        左下の丸をドラッグ → 移動<br>
        右下の緑ボタン → 機銃射撃（押し続けてもOK）<br>
        爆撃機モード時は赤ボタン → 爆弾投下
    </div>

    <div id="virtual-joystick">
        <div id="joystick-knob"></div>
    </div>
    <div id="fire-btn">射撃</div>
    <div id="bomb-btn">爆弾</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let mode, selectedPlane, difficulty, mapType;
        let player = {}, ally = {}, target = null;
        let bullets = [], enemyBullets = [], enemies = [];
        let lastShot = 0, lastBomb = 0;
        let gameTime = 0, score = 0, spawnTimer = 0;
        let gameRunning = false;

        // モバイルコントロール
        let joystick = { active: false, dx: 0, dy: 0 };
        let firePressed = false;
        let bombPressed = false;

        const fighters = [
            {name: "零戦", armor: 75, speed: 6.5, fireRate: 12},
            {name: "IL-2 (1942)", armor: 130, speed: 5.0, fireRate: 8},
            {name: "Yak-3", armor: 65, speed: 7.5, fireRate: 14},
            {name: "Spitfire Mk.V", armor: 85, speed: 6.8, fireRate: 11},
            {name: "P-51 Mustang", armor: 90, speed: 6.2, fireRate: 10},
            {name: "Bf 109 G", armor: 80, speed: 7.0, fireRate: 13},
            {name: "Fw 190 A", armor: 95, speed: 5.8, fireRate: 9},
            {name: "Ki-84 疾風", armor: 88, speed: 6.5, fireRate: 12},
            {name: "P-38 Lightning", armor: 105, speed: 5.5, fireRate: 8},
            {name: "Tempest Mk.V", armor: 82, speed: 7.2, fireRate: 13}
        ];

        const bombers = [
            {name: "Catalina", armor: 160, speed: 4.0, fireRate: 6},
            {name: "B-34 Ventura", armor: 145, speed: 4.5, fireRate: 7},
            {name: "B-17 Flying Fortress", armor: 220, speed: 3.5, fireRate: 5},
            {name: "Lancaster", armor: 190, speed: 4.0, fireRate: 6},
            {name: "He 111", armor: 135, speed: 4.3, fireRate: 7}
        ];

        function updatePlaneOptions() {
            const modeVal = document.getElementById('mode').value;
            const select = document.getElementById('planeSelect');
            select.innerHTML = '';
            const list = (modeVal === 'fighter') ? fighters : bombers;
            list.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = `${p.name}（装甲 ${p.armor}）`;
                select.appendChild(opt);
            });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startGame() {
            mode = document.getElementById('mode').value;
            const planeName = document.getElementById('planeSelect').value;
            difficulty = document.getElementById('difficulty').value;
            mapType = document.getElementById('map').value;

            const list = (mode === 'fighter') ? fighters : bombers;
            selectedPlane = list.find(p => p.name === planeName);

            player = {
                x: canvas.width / 2 - 20,
                y: canvas.height - 100,
                width: 48,
                height: 42,
                speed: selectedPlane.speed * 0.85,      // 移動速度を下げて調整（約15%減）
                health: selectedPlane.armor,
                maxHealth: selectedPlane.armor,
                fireRate: selectedPlane.fireRate * 1.15
            };

            if (mode === 'fighter') {
                ally = {
                    x: canvas.width * 0.25,
                    y: canvas.height * 0.35,
                    width: 68,
                    height: 48,
                    health: 220,
                    maxHealth: 220,
                    speed: 2.0
                };
            } else {
                ally = {
                    x: canvas.width * 0.6,
                    y: canvas.height - 220,
                    width: 48,
                    height: 40,
                    health: 140,
                    maxHealth: 140,
                    speed: 6.0
                };
                document.getElementById('bomb-btn').style.display = 'flex';
            }

            if (mode === 'bomber') {
                target = {
                    x: canvas.width * 0.7,
                    y: canvas.height - 140,
                    width: 140,
                    height: 70,
                    health: 320,
                    maxHealth: 320
                };
            }

            bullets = []; enemyBullets = []; enemies = [];
            gameTime = score = spawnTimer = 0;
            lastShot = lastBomb = Date.now();

            for (let i = 0; i < (difficulty === 'easy' ? 4 : 6); i++) spawnEnemy();

            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('instructions').style.display = 'block';
            document.getElementById('virtual-joystick').style.display = 'block';
            document.getElementById('fire-btn').style.display = 'flex';

            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function spawnEnemy() {
            const ex = Math.random() * (canvas.width - 50);
            enemies.push({
                x: ex,
                y: -50,
                width: 50,
                height: 38,
                health: (difficulty === 'easy') ? 50 : (difficulty === 'medium') ? 80 : 120
            });
        }

        function collide(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x &&
                   a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function drawPlane(x, y, w, h, mainColor, wingColor, isPlayer, isAlly) {
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            ctx.fillStyle = mainColor;
            ctx.fillRect(-8, -h/2, 16, h);
            ctx.fillStyle = wingColor;
            ctx.fillRect(-w/2 + 4, -8, w - 8, 16);
            ctx.fillRect(-16, h/2 - 12, 32, 10);
            ctx.fillStyle = '#ffff88';
            ctx.fillRect(-5, -h/2 - 12, 10, 20);
            if (isPlayer) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-w/2, 0);
                ctx.lineTo(w/2, 0);
                ctx.stroke();
            }
            if (isAlly) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = isPlayer ? '#00ff88' : (mode === 'fighter' ? '#00aaff' : '#ffaa44');
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }

        // ジョイスティック
        const joystickEl = document.getElementById('virtual-joystick');
        const knob = document.getElementById('joystick-knob');
        const fireBtn = document.getElementById('fire-btn');
        const bombBtn = document.getElementById('bomb-btn');

        joystickEl.addEventListener('touchstart', e => { e.preventDefault(); joystick.active = true; moveJoystick(e.touches[0]); });
        joystickEl.addEventListener('touchmove', e => { e.preventDefault(); if (joystick.active) moveJoystick(e.touches[0]); });
        joystickEl.addEventListener('touchend', () => { joystick.active = false; joystick.dx = joystick.dy = 0; knob.style.left = knob.style.top = '50%'; });

        function moveJoystick(touch) {
            const rect = joystickEl.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.hypot(dx, dy);
            const max = 60;

            if (dist > max) {
                dx *= max / dist;
                dy *= max / dist;
            }

            joystick.dx = dx / max;
            joystick.dy = dy / max;

            knob.style.left = `${50 + (dx / max * 45)}%`;
            knob.style.top  = `${50 + (dy / max * 45)}%`;
        }

        fireBtn.addEventListener('touchstart', e => { e.preventDefault(); firePressed = true; });
        fireBtn.addEventListener('touchend',   () => firePressed = false);
        fireBtn.addEventListener('touchcancel', () => firePressed = false);

        bombBtn.addEventListener('touchstart', e => { e.preventDefault(); bombPressed = true; });
        bombBtn.addEventListener('touchend',   () => bombPressed = false);
        bombBtn.addEventListener('touchcancel', () => bombPressed = false);

        let keys = {};
        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') e.preventDefault(); });
        window.addEventListener('keyup',   e => { keys[e.key] = false; });

        function gameLoop() {
            if (!gameRunning) return;
            const now = Date.now();

            // 移動計算（ジョイスティック優先、射撃中でも移動可能に）
            let moveX = joystick.dx * player.speed * 2.2;
            let moveY = joystick.dy * player.speed * 2.2;

            // PCキー
            if (keys['ArrowLeft'] || keys['a']) moveX -= player.speed;
            if (keys['ArrowRight']|| keys['d']) moveX += player.speed;
            if (keys['ArrowUp']   || keys['w']) moveY -= player.speed;
            if (keys['ArrowDown'] || keys['s']) moveY += player.speed;

            player.x += moveX;
            player.y += moveY;

            player.x = Math.max(20, Math.min(canvas.width - player.width - 20, player.x));
            player.y = Math.max(20, Math.min(canvas.height - player.height - 80, player.y));

            // 射撃（押しっぱなしで連射）
            const shotInterval = 1000 / player.fireRate;
            if ((firePressed || keys[' '] || keys['z']) && now - lastShot > shotInterval) {
                bullets.push({ x: player.x + player.width/2 - 4, y: player.y + 4, dy: -13, isBomb: false });
                lastShot = now;
            }

            // 爆弾
            if (mode === 'bomber' && (bombPressed || keys['b']) && now - lastBomb > 800) {
                bullets.push({ x: player.x + player.width/2 - 6, y: player.y + 20, dy: 9, isBomb: true });
                lastBomb = now;
            }

            gameTime++;

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y += b.dy;
                if ((!b.isBomb && b.y < -30) || (b.isBomb && b.y > canvas.height + 30)) bullets.splice(i,1);
            }

            spawnTimer++;
            const spawnInt = (difficulty==='easy')?80:(difficulty==='medium')?45:25;
            if (spawnTimer > spawnInt) {
                spawnEnemy();
                if (difficulty === 'hard') spawnEnemy();
                spawnTimer = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += 3.0;
                let tx = (mode==='fighter') ? ally.x+30 : player.x+24;
                let ty = (mode==='fighter') ? ally.y+20 : player.y+20;
                let dx = tx - e.x - e.width/2;
                let dy = ty - e.y;
                let d = Math.hypot(dx, dy) || 1;
                e.x += (dx / d) * 1.6;

                if (e.y > canvas.height + 60) { enemies.splice(i,1); continue; }

                if (Math.random() < 0.022) {
                    enemyBullets.push({x: e.x + e.width/2, y: e.y + e.height, dy: 7.5});
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.y += eb.dy;
                if (eb.y > canvas.height + 30) enemyBullets.splice(i,1);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (collide(b, enemies[j])) {
                        enemies[j].health -= b.isBomb ? 50 : 30;
                        bullets.splice(i,1);
                        if (enemies[j].health <= 0) {
                            enemies.splice(j,1);
                            score += 140;
                        }
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                if (collide(player, {x:eb.x-4, y:eb.y-4, width:8, height:8})) {
                    player.health -= 14;
                    enemyBullets.splice(i,1);
                    if (player.health <= 0) return endGame(false);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (collide(player, enemies[i])) {
                    player.health -= 40;
                    enemies.splice(i,1);
                    if (player.health <= 0) return endGame(false);
                }
            }

            if (mode === 'fighter') {
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    if (collide(ally, {x:enemyBullets[i].x-4,y:enemyBullets[i].y-4,width:8,height:8})) {
                        ally.health -= 20;
                        enemyBullets.splice(i,1);
                    }
                }
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (collide(ally, enemies[i])) {
                        ally.health -= 45;
                        enemies.splice(i,1);
                    }
                }
            }

            if (mode === 'bomber' && target) {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    if (b.isBomb && collide(b, target)) {
                        target.health -= 55;
                        bullets.splice(i,1);
                        if (target.health <= 0) {
                            score += 1000;
                            return endGame(true);
                        }
                    }
                }
            }

            if (mode === 'fighter') {
                ally.x += ally.speed;
                if (ally.x > canvas.width + 40) ally.x = canvas.width + 40;
            } else {
                ally.x += (player.x + 60 - ally.x) * 0.14;
                ally.y = player.y - 120;
            }

            if (mode === 'fighter' && gameTime > 3600 && ally.health > 0) return endGame(true);
            if (ally.health <= 0) return endGame(false);

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = (mapType === 'pacific') ? '#7dd3fc' : '#a3c9e0';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = 'rgba(255,255,255,0.65)';
            ctx.fillRect(canvas.width*0.08, canvas.height*0.12, 220, 45);
            ctx.fillRect(canvas.width*0.55, canvas.height*0.22, 190, 38);
            ctx.fillRect(canvas.width*0.78, canvas.height*0.08, 140, 50);

            drawPlane(player.x, player.y, player.width, player.height, '#00ff44', '#009922', true, false);

            const allyMain = mode === 'fighter' ? '#00aaff' : '#ffaa00';
            const allyWing = mode === 'fighter' ? '#0088cc' : '#cc8800';
            drawPlane(ally.x, ally.y, ally.width, ally.height, allyMain, allyWing, false, true);

            if (target) {
                ctx.fillStyle = '#5c4033';
                ctx.fillRect(target.x, target.y, target.width, target.height);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('目標施設', target.x + 20, target.y + 42);
                const hp = target.health / target.maxHealth;
                ctx.fillStyle = hp > 0.35 ? '#22ff22' : '#ff4444';
                ctx.fillRect(target.x, target.y - 16, target.width * hp, 10);
            }

            ctx.fillStyle = '#ffffff';
            for (let b of bullets) if (!b.isBomb) ctx.fillRect(b.x, b.y, 8, 18);

            ctx.fillStyle = '#222222';
            for (let b of bullets) {
                if (b.isBomb) {
                    ctx.beginPath();
                    ctx.arc(b.x + 4, b.y + 8, 9, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            ctx.fillStyle = '#ff4444';
            for (let eb of enemyBullets) ctx.fillRect(eb.x - 3, eb.y, 6, 16);

            for (let e of enemies) {
                drawPlane(e.x, e.y, e.width, e.height, '#ff3333', '#aa0000', false, false);
            }

            let php = Math.max(0, player.health / player.maxHealth);
            ctx.fillStyle = php > 0.5 ? '#44ff44' : php > 0.25 ? '#ffaa00' : '#ff4444';
            ctx.fillRect(player.x - 4, player.y - 20, player.width + 8, 10);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - 4, player.y - 20, player.width + 8, 10);

            let ahp = Math.max(0, ally.health / ally.maxHealth);
            ctx.fillStyle = ahp > 0.5 ? '#44aaff' : '#ff4444';
            ctx.fillRect(ally.x - 4, ally.y - 20, ally.width + 8, 10);
            ctx.strokeRect(ally.x - 4, ally.y - 20, ally.width + 8, 10);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 28px sans-serif';
            ctx.fillText(`時間 ${Math.floor(gameTime/60)}`, 24, 50);
            ctx.fillText(`SCORE ${score}`, 24, 90);

            ctx.font = '20px sans-serif';
            ctx.fillText(mode==='fighter'?'味方爆撃機を守れ！':'目標を爆撃せよ！', canvas.width - 260, 50);
        }

        function endGame(win) {
            gameRunning = false;
            setTimeout(() => {
                alert(win ? 
                    `✈️ ミッション成功！\nスコア ${score}点` : 
                    `💥 撃墜されました…\nスコア ${score}点`);
                location.reload();
            }, 400);
        }

        window.onload = () => {
            document.getElementById('mode').addEventListener('change', updatePlaneOptions);
            updatePlaneOptions();
        };
    </script>
</body>
</html>
